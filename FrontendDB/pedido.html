<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Gimnasio - Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gestión de Pedidos 🏋️‍♂️</h1>
    </header>

    <nav class="menu-principal">
        <ul>
            <li><a href="index.html">Inicio / Inventario</a></li>
            <li><a href="socios.html">Gestión de Socios</a></li>
            <li><a href="pedido.html">Pedidos Realizados</a></li>
        </ul>
    </nav>

    <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Registro de Ventas 🛒</h2>

    <button id="btn-nuevo-pedido" class="btn-principal" onclick="toggleFormulario()">➕ Realizar Nuevo Pedido</button>

    <div id="formulario-pedido" class="formulario-tarjeta" style="display: none;">
        <h3 style="margin-bottom: 15px; color: #2c3e50;">Nuevo Ticket</h3>
        
        <input type="text" id="input-socio" placeholder="ID del Socio (ej: S001)">
        <input type="text" id="input-producto" placeholder="ID del Producto (ej: ART002)">
        <input type="text" id="input-nombre-prod" placeholder="Nombre del Producto">
        <input type="number" id="input-precio" placeholder="Precio Unitario ($)">
        <input type="number" id="input-cantidad" placeholder="Cantidad">
        
        <button class="btn-principal" style="width: 100%; margin-bottom: 0;" onclick="guardarPedido()">Guardar Venta</button>
    </div>

    <div id="contenedor-productos">
        <p>Cargando pedidos desde el servidor...</p>
    </div>

    <script>
        function toggleFormulario() {
            const form = document.getElementById('formulario-pedido');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        // Función para enviar los datos al Backend
        async function guardarPedido() {
            //  Recolectamos lo que escribiste en los inputs
            const idSocio = document.getElementById('input-socio').value;
            const idProducto = document.getElementById('input-producto').value;
            const nombreProd = document.getElementById('input-nombre-prod').value;
            const precio = parseFloat(document.getElementById('input-precio').value);
            const cantidad = parseInt(document.getElementById('input-cantidad').value);

            // Validamos que no haya campos vacíos
            if(!idSocio || !idProducto || !nombreProd || !precio || !cantidad) {
                alert("Por favor, completá todos los campos.");
                return;
            }

            //  Calculamos el total y armamos el paquete de datos (JSON)
            const totalCalculado = precio * cantidad;
            
            const nuevoPedido = {
                id_socio: idSocio,
                productos: [{
                    id_producto: idProducto,
                    nombre: nombreProd,
                    cantidad: cantidad,
                    precio_unitario: precio
                }],
                estado: "entregado",
                total: totalCalculado
            };

            try {
                // Enviamos el paquete al servidor mediante POST
                const respuesta = await fetch('http://localhost:5000/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoPedido)
                });

                if(respuesta.ok) {
                    alert("¡Pedido registrado exitosamente!");
                    // Ocultamos el form, limpiamos los inputs y recargamos la lista
                    toggleFormulario();
                    document.getElementById('input-socio').value = '';
                    document.getElementById('input-producto').value = '';
                    document.getElementById('input-nombre-prod').value = '';
                    document.getElementById('input-precio').value = '';
                    document.getElementById('input-cantidad').value = '';
                    cargarPedidos(); 
                }
            } catch (error) {
                alert("Hubo un error al guardar el pedido.");
            }
        }

        async function cargarPedidos() {
            try {
                const respuesta = await fetch('http://localhost:5000/api/pedidos');
                const pedidos = await respuesta.json();

                const contenedor = document.getElementById('contenedor-productos');
                contenedor.innerHTML = ''; 

                pedidos.forEach(pedido => {
                    const fecha = new Date(pedido.fecha_pedido).toLocaleString('es-AR');
                    
                    // Armamos una lista HTML con los productos de este pedido específico
                    let listaProductosHTML = '<ul style="margin-bottom: 10px; padding-left: 20px; color: #555;">';
                    pedido.productos.forEach(item => {
                        listaProductosHTML += `<li>${item.cantidad}x ${item.nombre} ($${item.precio_unitario})</li>`;
                    });
                    listaProductosHTML += '</ul>';

                    const div = document.createElement('div');
                    div.className = 'producto-card';
                    const botonCompletar = pedido.estado !== 'completado' 
                        ? `<button onclick="completarPedido('${pedido._id}')" style="background-color: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; flex-grow: 1;">✔️ Completar</button>` 
                        : '';

                    div.innerHTML = `
                        <h3>Ticket de Socio: ${pedido.id_socio}</h3>
                        <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 10px;">📅 ${fecha}</p>
                        <p><strong>Artículos comprados:</strong></p>
                        ${listaProductosHTML}
                        <p style="color: #2980b9; font-weight: bold;">Estado: ${pedido.estado.toUpperCase()}</p>
                        <p class="precio" style="margin-top: auto;">Total: $${pedido.total}</p>
                        
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            ${botonCompletar}
                            <button onclick="eliminarPedido('${pedido._id}')" style="background-color: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; flex-grow: 1;">🗑️ Eliminar</button>
                        </div>
                    `;
                    contenedor.appendChild(div);
                });

            } catch (error) {
                document.getElementById('contenedor-productos').innerHTML = '<p style="color: red;">Error al conectar con el servidor.</p>';
            }
        }
        async function completarPedido(id_mongo) {
            try {
                await fetch(`http://localhost:5000/api/pedidos/${id_mongo}/completar`, {
                    method: 'PATCH'
                });
                cargarPedidos();
            } catch (error) {
                alert("Error al actualizar");
            }
        }

        async function eliminarPedido(id_mongo) {
            if(confirm("¿Seguro que querés borrar este ticket?")) {
                try {
                    await fetch(`http://localhost:5000/api/pedidos/${id_mongo}`, {
                        method: 'DELETE'
                    });
                    cargarPedidos();
                } catch (error) {
                    alert("Error al eliminar");
                }
            }
        }

        cargarPedidos();
    </script>
</body>
</html>
