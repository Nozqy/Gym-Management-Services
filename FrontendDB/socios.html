<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Gimnasio - Socios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Gestor de Gimnasio 🏋️‍♂️</h1>
    </header>

    <nav class="menu-principal">
        <ul>
            <li><a href="index.html">Inicio / Inventario</a></li>
            <li><a href="pedido.html">Pedidos Realizados</a></li>
        </ul>
    </nav>

    <h2 style="text-align: center; color: #f1c40f; margin-bottom: 20px;">Gestión de Socios 🏃‍♂️</h2>
    
    <!-- Botón para abrir el formulario -->
    <button id="btn-nuevo-socio" class="btn-principal" onclick="toggleFormularioSocio()">➕ Registrar Nuevo Socio</button>

    <!-- Formulario oculto por defecto (¡Sin el campo de ID!) -->
    <div id="formulario-socio" class="formulario-tarjeta" style="display: none;">
        <h3 style="margin-bottom: 15px; color: #2c3e50;">Nuevo Ingreso</h3>
        
        <input type="text" id="input-nombre-socio" placeholder="Nombre y Apellido">
        <input type="email" id="input-correo" placeholder="Correo Electrónico">
        <input type="text" id="input-telefono" placeholder="Teléfono">
        <input type="text" id="input-membresia" placeholder="Plan (ej: Pase Libre)">
        <input type="number" id="input-precio-membresia" placeholder="Precio Mensual ($)">
        
        <button class="btn-principal" style="width: 100%; margin-bottom: 0;" onclick="guardarSocio()">Dar de Alta</button>
    </div>

    <div id="contenedor-productos">
        <p>Cargando socios desde el servidor...</p>
    </div>

    <script>
        function toggleFormularioSocio() {
            const form = document.getElementById('formulario-socio');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function cargarSocios() {
            try {
                const respuesta = await fetch('http://localhost:5000/api/socios');
                const socios = await respuesta.json();

                const contenedor = document.getElementById('contenedor-productos');
                contenedor.innerHTML = ''; 

                socios.forEach(socio => {
                    const fechaVencimiento = new Date(socio.membresia_actual.fecha_vencimiento).toLocaleDateString('es-AR');
                    const colorEstado = socio.estado_activo ? '#27ae60' : '#e74c3c';
                    const textoEstado = socio.estado_activo ? 'ACTIVO' : 'INACTIVO';

                    const div = document.createElement('div');
                    div.className = 'producto-card';
                    div.innerHTML = `
                        <h3>${socio.nombre} <span style="font-size: 0.6em; color: gray;">(${socio.id_socio})</span></h3>
                        <p>📧 ${socio.correo} <br> 📱 ${socio.telefono}</p>
                        <p style="color: ${colorEstado}; font-weight: bold;">Estado: ${textoEstado}</p>
                        <p class="stock">Plan: ${socio.membresia_actual.tipo} <br> Vence: ${fechaVencimiento}</p>
                        <button onclick="eliminarSocio('${socio._id}')" style="background-color: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; width: 100%;">🗑️ Eliminar Socio</button>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) {
                document.getElementById('contenedor-productos').innerHTML = '<p style="color: red;">Error al conectar con el servidor.</p>';
            }
        }

        async function guardarSocio() {
            // Ya no recolectamos el idSocio
            const nombre = document.getElementById('input-nombre-socio').value;
            const correo = document.getElementById('input-correo').value;
            const telefono = document.getElementById('input-telefono').value;
            const membresia = document.getElementById('input-membresia').value;
            const precio = parseFloat(document.getElementById('input-precio-membresia').value);

            if(!nombre || !correo || !membresia || !precio) {
                alert("Por favor, completá los campos obligatorios.");
                return;
            }

            const fechaVencimiento = new Date();
            fechaVencimiento.setMonth(fechaVencimiento.getMonth() + 1);

            // El id_socio ya NO se envía, el backend lo genera
            const nuevoSocio = {
                nombre: nombre,
                correo: correo,
                telefono: telefono,
                estado_activo: true,
                membresia_actual: {
                    tipo: membresia,
                    precio_mensual: precio,
                    fecha_vencimiento: fechaVencimiento
                },
                historial_pagos: []
            };

            try {
                const respuesta = await fetch('http://localhost:5000/api/socios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoSocio)
                });

                if(respuesta.ok) {
                    alert("¡Socio registrado exitosamente!");
                    
                    toggleFormularioSocio();
                    document.getElementById('input-nombre-socio').value = '';
                    document.getElementById('input-correo').value = '';
                    document.getElementById('input-telefono').value = '';
                    document.getElementById('input-membresia').value = '';
                    document.getElementById('input-precio-membresia').value = '';
                    
                    cargarSocios(); 
                }
            } catch (error) {
                alert("Hubo un error al guardar el socio.");
            }
        }

        async function eliminarSocio(id_mongo) {
            if(confirm("¿Estás seguro de que querés eliminar a este socio?")) {
                try {
                    await fetch(`http://localhost:5000/api/socios/${id_mongo}`, {
                        method: 'DELETE'
                    });
                    cargarSocios(); 
                } catch (error) {
                    alert("Error al eliminar");
                }
            }
        }

        cargarSocios();
    </script>
</body>
</html>
